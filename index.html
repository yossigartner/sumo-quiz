<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumo Wrestler Quiz</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #logo {
      margin-top: 28px;
      width: 88px;
      height: 88px;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(233, 69, 96, 0.35));
    }

    h1 {
      margin: 10px 0 8px;
      font-size: 1.8rem;
    }

    #score {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    #photo-container {
      width: 300px;
      max-width: calc(100vw - 32px);
      aspect-ratio: 300 / 380;
      border-radius: 12px;
      overflow: hidden;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    #photo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #options {
      margin: 24px 0;
      width: 340px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    #guess-input {
      flex: 1;
      padding: 12px;
      font-size: 1rem;
      border: 2px solid #444;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
    }

    #guess-input::placeholder { color: #666; }

    #guess-input:focus {
      outline: none;
      border-color: #e94560;
    }

    #submit-btn {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    #submit-btn:hover:not(:disabled) {
      background: #c73652;
    }

    #submit-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #feedback {
      font-size: 1.1rem;
      margin-bottom: 8px;
      min-height: 1.4em;
    }

    #feedback.correct { color: #4ecca3; }
    #feedback.wrong { color: #e94560; }

    #next-btn {
      padding: 12px 40px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    #next-btn:hover {
      background: #c73652;
    }

    #loading {
      margin-top: 100px;
      font-size: 1.2rem;
      color: #aaa;
    }

    #progress-container {
      width: 340px;
      max-width: calc(100vw - 32px);
      margin-bottom: 16px;
    }

    #progress-label {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    #progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #16213e;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #333;
    }

    #progress-bar-fill {
      height: 100%;
      background: #4ecca3;
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }

    #stats-panel {
      width: 340px;
      max-width: calc(100vw - 32px);
      margin-top: 24px;
      margin-bottom: 32px;
    }

    #stats-panel summary {
      cursor: pointer;
      color: #aaa;
      font-size: 0.9rem;
      padding: 6px 0;
      user-select: none;
    }

    #stats-grid {
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
    }

    .stat-row {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      font-size: 0.85rem;
      border-bottom: 1px solid #222;
      gap: 8px;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-name { flex: 1; }

    .stat-counts { color: #888; font-size: 0.8rem; }

    #reset-btn {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
    }

    #reset-btn:hover { border-color: #e94560; color: #e94560; }

    #idk-btn {
      padding: 12px 20px;
      font-size: 1rem;
      border: 2px solid #444;
      border-radius: 10px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #idk-btn:hover:not(:disabled) {
      border-color: #f5a623;
      color: #f5a623;
    }

    #idk-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #basho-countdown {
      width: 340px;
      max-width: calc(100vw - 32px);
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    #basho-label {
      font-size: 0.75rem;
      color: #e94560;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    #basho-name {
      font-size: 1rem;
      font-weight: 600;
      color: #eee;
    }

    #basho-date {
      font-size: 0.8rem;
      color: #888;
      margin: 1px 0 6px;
    }

    #basho-timer {
      font-size: 1.25rem;
      font-weight: 700;
      color: #eee;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    #mode-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
      background: #16213e;
      border-radius: 10px;
      padding: 4px;
      width: 340px;
      max-width: calc(100vw - 32px);
    }

    .mode-tab {
      flex: 1;
      padding: 8px;
      font-size: 0.9rem;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: #e94560;
      color: #fff;
      font-weight: 600;
    }

    .mode-tab:hover:not(.active) { color: #eee; }

    #elim-ui {
      width: 340px;
      max-width: calc(100vw - 32px);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
    }

    #elim-progress-text {
      font-size: 0.9rem;
      color: #aaa;
    }

    #elim-bar-bg {
      width: 100%;
      height: 6px;
      background: #16213e;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #333;
    }

    #elim-bar-fill {
      height: 100%;
      background: #4ecca3;
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    #elim-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    #unknown-btn {
      flex: 1;
      padding: 14px;
      font-size: 1rem;
      border: 2px solid #e94560;
      border-radius: 10px;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #unknown-btn:hover { background: #e94560; color: #fff; }

    #know-btn {
      flex: 1;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #4ecca3;
      color: #1a1a2e;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    #know-btn:hover { background: #3ab890; }

    #elim-hint {
      font-size: 0.75rem;
      color: #555;
    }

    #training-summary {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 340px;
      max-width: calc(100vw - 32px);
      margin: 20px 0;
      text-align: center;
    }

    #summary-text {
      color: #aaa;
      font-size: 1rem;
      line-height: 1.7;
    }

    #start-training-btn {
      padding: 12px 36px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    #start-training-btn:hover:not(:disabled) { background: #c73652; }
    #start-training-btn:disabled { opacity: 0.4; cursor: default; }

    #redo-elim-btn {
      padding: 8px 16px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
    }

    #redo-elim-btn:hover { border-color: #e94560; color: #e94560; }

    @media (max-width: 400px) {
      #logo { width: 68px; height: 68px; margin-top: 18px; }
      h1 { font-size: 1.4rem; }
      #guess-input { flex-basis: 100%; }
      #submit-btn, #idk-btn { flex: 1; }
    }
  </style>
</head>
<body>
  <img id="logo" src="logo.svg" alt="Sumo Quiz Logo">
  <h1>Sumo Wrestler Quiz</h1>
  <p id="score"></p>
  <div id="mode-tabs">
    <button id="tab-quiz" class="mode-tab active">Quiz</button>
    <button id="tab-training" class="mode-tab">Training Mode</button>
  </div>
  <div id="progress-container">
    <div id="progress-label"><span>Mastered</span><span id="progress-text">0 / 0</span></div>
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
  </div>
  <div id="basho-countdown">
    <div id="basho-label">Next Basho</div>
    <div id="basho-name"></div>
    <div id="basho-date"></div>
    <div id="basho-timer"></div>
  </div>

  <div id="photo-container">
    <span id="loading">Loading...</span>
  </div>
  <div id="options">
    <input id="guess-input" list="wrestler-list" placeholder="Type a wrestler name..." autocomplete="off">
    <datalist id="wrestler-list"></datalist>
    <button id="submit-btn">Submit</button>
    <button id="idk-btn">I don't know</button>
  </div>
  <p id="feedback"></p>
  <button id="next-btn">Next</button>

  <div id="elim-ui">
    <div id="elim-progress-text"></div>
    <div id="elim-bar-bg"><div id="elim-bar-fill"></div></div>
    <div id="elim-buttons">
      <button id="unknown-btn">Don't Know</button>
      <button id="know-btn">I Know This</button>
    </div>
    <div id="elim-hint">← / N &nbsp;·&nbsp; Know / Y →</div>
  </div>

  <div id="training-summary">
    <p id="summary-text"></p>
    <button id="start-training-btn">Start Training</button>
    <button id="redo-elim-btn">Redo Elimination</button>
  </div>

  <details id="stats-panel">
    <summary>Show progress</summary>
    <div id="stats-grid"></div>
    <button id="reset-btn">Reset Progress</button>
  </details>

  <script>
    const STORAGE_KEY = "sumo-quiz-stats";
    const KNOWN_KEY   = "sumo-quiz-known";
    const BASE_WEIGHT = 1;
    const SCALE_WEIGHT = 9;
    const UNSEEN_ERROR_RATE = 0.5;

    let wrestlers = [];
    let correct = 0;
    let total = 0;
    let answered = false;
    let currentAnswer = null;
    let winStreak = 0;

    // Training mode state
    let gameMode = "quiz";          // "quiz" | "elimination" | "summary" | "training"
    let eliminationQueue = [];
    let knownSet = new Set();

    function loadKnown() {
      try { return new Set(JSON.parse(localStorage.getItem(KNOWN_KEY)) || []); }
      catch { return new Set(); }
    }
    function saveKnown() {
      localStorage.setItem(KNOWN_KEY, JSON.stringify([...knownSet]));
    }
    function hasEliminationData() {
      return localStorage.getItem(KNOWN_KEY) !== null;
    }
    function getUnknownPool() {
      return wrestlers.filter(w => !knownSet.has(w.name));
    }

    const scoreEl = document.getElementById("score");
    const photoContainer = document.getElementById("photo-container");
    const inputEl = document.getElementById("guess-input");
    const datalistEl = document.getElementById("wrestler-list");
    const submitBtn = document.getElementById("submit-btn");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const idkBtn = document.getElementById("idk-btn");
    const statsGrid = document.getElementById("stats-grid");
    const progressFill = document.getElementById("progress-bar-fill");
    const progressText = document.getElementById("progress-text");

    // Strip diacritics: ō→o, ū→u, ā→a, etc.
    function normalizeName(name) {
      return name.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function loadStats() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveStats(stats) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
    }

    function getWrestlerStats(stats, name) {
      return stats[name] || { correct: 0, wrong: 0 };
    }

    function computeWeight(name, stats) {
      const s = getWrestlerStats(stats, name);
      const attempts = s.correct + s.wrong;
      const errorRate = attempts === 0 ? UNSEEN_ERROR_RATE : s.wrong / attempts;
      return BASE_WEIGHT + errorRate * SCALE_WEIGHT;
    }

    function weightedPick(pool, stats) {
      const weights = pool.map(w => computeWeight(w.name, stats));
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < pool.length; i++) {
        r -= weights[i];
        if (r <= 0) return pool[i];
      }
      return pool[pool.length - 1];
    }

    function populateDropdown() {
      datalistEl.innerHTML = "";
      const sorted = [...wrestlers].sort((a, b) => a.name.localeCompare(b.name));
      sorted.forEach(w => {
        const opt = document.createElement("option");
        opt.value = normalizeName(w.name);
        datalistEl.appendChild(opt);
      });
    }

    function updateProgress(stats) {
      const pool = gameMode === "training" ? getUnknownPool() : wrestlers;
      const mastered = pool.filter(w => {
        const s = getWrestlerStats(stats, w.name);
        const attempts = s.correct + s.wrong;
        return attempts >= 3 && (s.wrong / attempts) < 0.25;
      }).length;
      const pct = pool.length ? (mastered / pool.length) * 100 : 0;
      progressFill.style.width = `${pct}%`;
      progressText.textContent = `${mastered} / ${pool.length}`;
    }

    function renderStatsPanel(stats) {
      statsGrid.innerHTML = "";
      const sorted = [...wrestlers].sort((a, b) => a.name.localeCompare(b.name));
      sorted.forEach(w => {
        const s = getWrestlerStats(stats, w.name);
        const attempts = s.correct + s.wrong;
        const errorRate = attempts === 0 ? UNSEEN_ERROR_RATE : s.wrong / attempts;
        const color = errorRate < 0.25 ? "#4ecca3"
                    : errorRate < 0.75 ? "#f5a623"
                    : "#e94560";
        const row = document.createElement("div");
        row.className = "stat-row";
        row.innerHTML = `
          <span class="stat-dot" style="background:${color}"></span>
          <span class="stat-name">${w.name}</span>
          <span class="stat-counts">${attempts === 0 ? "not seen" : `${s.correct}✓ ${s.wrong}✗`}</span>
        `;
        statsGrid.appendChild(row);
      });
    }

    function updateScore() {
      scoreEl.textContent = `Score: ${correct} / ${total}`;
    }

    function showWrestlerPhoto(wrestler) {
      const img = document.createElement("img");
      img.src = `wiki_images/${encodeURIComponent(wrestler.image)}`;
      img.alt = "Sumo wrestler";
      photoContainer.innerHTML = "";
      photoContainer.appendChild(img);
    }

    function loadRound() {
      const pool = gameMode === "training" ? getUnknownPool() : wrestlers;
      if (pool.length === 0) {
        photoContainer.innerHTML = `<div style="text-align:center;padding:20px;color:#4ecca3;font-size:1.05rem;font-weight:600;line-height:1.6">
          Training pool mastered!<br>
          <span style="font-size:0.85rem;color:#888;font-weight:400">Redo elimination to refresh your pool</span>
        </div>`;
        feedbackEl.textContent = "";
        nextBtn.style.display = "none";
        return;
      }
      const stats = loadStats();
      answered = false;
      nextBtn.style.display = "none";
      feedbackEl.textContent = "";
      feedbackEl.className = "";
      inputEl.value = "";
      inputEl.disabled = false;
      submitBtn.disabled = false;
      idkBtn.disabled = false;

      currentAnswer = weightedPick(pool, stats);
      showWrestlerPhoto(currentAnswer);
    }

    submitBtn.addEventListener("click", () => {
      const selected = inputEl.value.trim();
      const isValid = wrestlers.some(w => normalizeName(w.name) === selected);
      if (answered || !isValid) return;
      answered = true;
      total++;

      inputEl.disabled = true;
      submitBtn.disabled = true;
      idkBtn.disabled = true;

      const stats = loadStats();
      if (!stats[currentAnswer.name]) stats[currentAnswer.name] = { correct: 0, wrong: 0 };

      if (normalizeName(currentAnswer.name) === selected) {
        correct++;
        stats[currentAnswer.name].correct++;
        winStreak++;
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "correct";
        if (correct === 8 && (total - correct) < 8) {
          const utt = new SpeechSynthesisUtterance("勝ち越し");
          utt.lang = "ja-JP";
          speechSynthesis.speak(utt);
        }
      } else {
        stats[currentAnswer.name].wrong++;
        winStreak = 0;
        feedbackEl.textContent = `Wrong! It was ${currentAnswer.name}`;
        feedbackEl.className = "wrong";
      }

      saveStats(stats);
      updateScore();
      updateProgress(stats);
      renderStatsPanel(stats);
      nextBtn.style.display = "inline-block";
    });

    nextBtn.addEventListener("click", loadRound);

    idkBtn.addEventListener("click", () => {
      if (answered) return;
      answered = true;
      total++;
      inputEl.disabled = true;
      submitBtn.disabled = true;
      idkBtn.disabled = true;

      const stats = loadStats();
      if (!stats[currentAnswer.name]) stats[currentAnswer.name] = { correct: 0, wrong: 0 };
      stats[currentAnswer.name].wrong++;
      winStreak = 0;

      feedbackEl.textContent = `It's ${currentAnswer.name}`;
      feedbackEl.className = "wrong";

      saveStats(stats);
      updateScore();
      updateProgress(stats);
      renderStatsPanel(stats);
      nextBtn.style.display = "inline-block";
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
      if (confirm("Reset all progress? This cannot be undone.")) {
        localStorage.removeItem(STORAGE_KEY);
        renderStatsPanel({});
        updateProgress({});
      }
    });

    // === TRAINING MODE ===

    function setUIMode(mode) {
      gameMode = mode;
      const isQuizLike = mode === "quiz" || mode === "training";
      const isElim = mode === "elimination";
      const isSummary = mode === "summary";

      document.getElementById("tab-quiz").classList.toggle("active", mode === "quiz");
      document.getElementById("tab-training").classList.toggle("active", mode !== "quiz");

      document.getElementById("score").style.display = isQuizLike ? "" : "none";
      document.getElementById("progress-container").style.display = isQuizLike ? "" : "none";
      document.getElementById("options").style.display = isQuizLike ? "" : "none";
      document.getElementById("stats-panel").style.display = isQuizLike ? "" : "none";
      feedbackEl.style.display = isQuizLike ? "" : "none";

      photoContainer.style.display = (isQuizLike || isElim) ? "" : "none";

      document.getElementById("elim-ui").style.display = isElim ? "flex" : "none";
      document.getElementById("training-summary").style.display = isSummary ? "flex" : "none";

      if (!isQuizLike) nextBtn.style.display = "none";
    }

    function startElimination() {
      knownSet = new Set();
      eliminationQueue = [...wrestlers].sort(() => Math.random() - 0.5);
      setUIMode("elimination");
      nextElimination();
    }

    function nextElimination() {
      if (eliminationQueue.length === 0) {
        saveKnown();
        showSummary();
        return;
      }
      const reviewed = wrestlers.length - eliminationQueue.length;
      const pct = (reviewed / wrestlers.length) * 100;
      document.getElementById("elim-progress-text").textContent =
        `${reviewed} / ${wrestlers.length} reviewed · ${knownSet.size} known`;
      document.getElementById("elim-bar-fill").style.width = `${pct}%`;
      showWrestlerPhoto(eliminationQueue[0]);
    }

    function markKnown() {
      if (gameMode !== "elimination" || eliminationQueue.length === 0) return;
      knownSet.add(eliminationQueue.shift().name);
      nextElimination();
    }

    function markUnknown() {
      if (gameMode !== "elimination" || eliminationQueue.length === 0) return;
      eliminationQueue.shift();
      nextElimination();
    }

    function showSummary() {
      const unknowns = getUnknownPool();
      const known = wrestlers.length - unknowns.length;
      document.getElementById("summary-text").innerHTML =
        `You know <strong style="color:#4ecca3">${known}</strong> wrestler${known !== 1 ? "s" : ""}.<br>` +
        `Training on <strong style="color:#e94560">${unknowns.length}</strong> unknown${unknowns.length !== 1 ? "s" : ""}.`;
      const startBtn = document.getElementById("start-training-btn");
      startBtn.disabled = unknowns.length === 0;
      startBtn.textContent = unknowns.length === 0 ? "No unknowns to train!" : "Start Training";
      setUIMode("summary");
    }

    function startTraining() {
      correct = 0;
      total = 0;
      setUIMode("training");
      const stats = loadStats();
      updateProgress(stats);
      updateScore();
      loadRound();
    }

    document.getElementById("tab-quiz").addEventListener("click", () => {
      if (wrestlers.length === 0) return;
      correct = 0;
      total = 0;
      setUIMode("quiz");
      const stats = loadStats();
      updateProgress(stats);
      updateScore();
      loadRound();
    });

    document.getElementById("tab-training").addEventListener("click", () => {
      if (wrestlers.length === 0) return;
      knownSet = loadKnown();
      if (!hasEliminationData()) {
        startElimination();
      } else {
        showSummary();
      }
    });

    document.getElementById("unknown-btn").addEventListener("click", markUnknown);
    document.getElementById("know-btn").addEventListener("click", markKnown);
    document.getElementById("start-training-btn").addEventListener("click", startTraining);
    document.getElementById("redo-elim-btn").addEventListener("click", startElimination);

    document.addEventListener("keydown", e => {
      if (gameMode !== "elimination") return;
      if (e.key === "ArrowRight" || e.key === "y" || e.key === "Y") markKnown();
      if (e.key === "ArrowLeft"  || e.key === "n" || e.key === "N") markUnknown();
    });

    // === BASHO COUNTDOWN ===

    const BASHO_SCHEDULE = [
      { name: "Hatsu Basho",  start: new Date("2026-01-11"), end: new Date("2026-01-25"), location: "Tokyo" },
      { name: "Haru Basho",   start: new Date("2026-03-08"), end: new Date("2026-03-22"), location: "Osaka" },
      { name: "Natsu Basho",  start: new Date("2026-05-10"), end: new Date("2026-05-24"), location: "Tokyo" },
      { name: "Nagoya Basho", start: new Date("2026-07-12"), end: new Date("2026-07-26"), location: "Nagoya" },
      { name: "Aki Basho",    start: new Date("2026-09-13"), end: new Date("2026-09-27"), location: "Tokyo" },
      { name: "Kyushu Basho", start: new Date("2026-11-08"), end: new Date("2026-11-22"), location: "Fukuoka" },
    ];

    function getBashoStatus() {
      const now = new Date();
      for (const b of BASHO_SCHEDULE) {
        if (now >= b.start && now <= b.end) return { basho: b, live: true };
      }
      for (const b of BASHO_SCHEDULE) {
        if (now < b.start) return { basho: b, live: false };
      }
      return null;
    }

    function formatCountdown(ms) {
      const s = Math.floor(ms / 1000);
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      const pad = n => String(n).padStart(2, "0");
      return d > 0
        ? `${d}d ${pad(h)}h ${pad(m)}m ${pad(sec)}s`
        : `${pad(h)}h ${pad(m)}m ${pad(sec)}s`;
    }

    function updateBashoCountdown() {
      const status = getBashoStatus();
      const countdownEl = document.getElementById("basho-countdown");
      if (!status) { countdownEl.style.display = "none"; return; }

      const { basho, live } = status;
      const startOpts = { month: "long", day: "numeric" };
      const startStr = basho.start.toLocaleDateString("en-US", startOpts);
      const endStr = basho.end.toLocaleDateString("en-US", { day: "numeric" });

      document.getElementById("basho-name").textContent = basho.name;
      document.getElementById("basho-date").textContent =
        `${startStr}–${endStr}, ${basho.start.getFullYear()} · ${basho.location}`;

      const timerEl = document.getElementById("basho-timer");
      if (live) {
        timerEl.textContent = "Live now!";
        timerEl.style.color = "#4ecca3";
        document.getElementById("basho-label").textContent = "Basho in Progress";
      } else {
        timerEl.textContent = formatCountdown(basho.start - new Date());
        timerEl.style.color = "#eee";
        document.getElementById("basho-label").textContent = "Next Basho";
      }
    }

    updateBashoCountdown();
    setInterval(updateBashoCountdown, 1000);

    fetch("wiki_images/wrestlers.json")
      .then(res => res.json())
      .then(data => {
        wrestlers = data;
        const stats = loadStats();
        populateDropdown();
        renderStatsPanel(stats);
        updateProgress(stats);
        updateScore();
        loadRound();
      })
      .catch(err => {
        document.getElementById("loading").textContent = "Failed to load wrestlers.json. Make sure to serve via a local server (python3 -m http.server).";
        console.error(err);
      });
  </script>
</body>
</html>
