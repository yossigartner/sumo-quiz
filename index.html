<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumo Wrestler Quiz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 24px 0 8px;
      font-size: 1.8rem;
    }

    #score {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    #photo-container {
      width: 300px;
      height: 380px;
      border-radius: 12px;
      overflow: hidden;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    #photo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #options {
      margin: 24px 0;
      width: 340px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #guess-input {
      flex: 1;
      padding: 12px;
      font-size: 1rem;
      border: 2px solid #444;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
    }

    #guess-input::placeholder { color: #666; }

    #guess-input:focus {
      outline: none;
      border-color: #e94560;
    }

    #submit-btn {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    #submit-btn:hover:not(:disabled) {
      background: #c73652;
    }

    #submit-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #feedback {
      font-size: 1.1rem;
      margin-bottom: 8px;
      min-height: 1.4em;
    }

    #feedback.correct { color: #4ecca3; }
    #feedback.wrong { color: #e94560; }

    #next-btn {
      padding: 12px 40px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    #next-btn:hover {
      background: #c73652;
    }

    #loading {
      margin-top: 100px;
      font-size: 1.2rem;
      color: #aaa;
    }

    #progress-container {
      width: 340px;
      margin-bottom: 16px;
    }

    #progress-label {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    #progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #16213e;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #333;
    }

    #progress-bar-fill {
      height: 100%;
      background: #4ecca3;
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }

    #stats-panel {
      width: 340px;
      margin-top: 24px;
      margin-bottom: 32px;
    }

    #stats-panel summary {
      cursor: pointer;
      color: #aaa;
      font-size: 0.9rem;
      padding: 6px 0;
      user-select: none;
    }

    #stats-grid {
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
    }

    .stat-row {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      font-size: 0.85rem;
      border-bottom: 1px solid #222;
      gap: 8px;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-name { flex: 1; }

    .stat-counts { color: #888; font-size: 0.8rem; }

    #reset-btn {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
    }

    #reset-btn:hover { border-color: #e94560; color: #e94560; }

    #idk-btn {
      padding: 12px 20px;
      font-size: 1rem;
      border: 2px solid #444;
      border-radius: 10px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #idk-btn:hover:not(:disabled) {
      border-color: #f5a623;
      color: #f5a623;
    }

    #idk-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
  </style>
</head>
<body>
  <h1>Sumo Wrestler Quiz</h1>
  <p id="score"></p>
  <div id="progress-container">
    <div id="progress-label"><span>Mastered</span><span id="progress-text">0 / 0</span></div>
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
  </div>
  <div id="photo-container">
    <span id="loading">Loading...</span>
  </div>
  <div id="options">
    <input id="guess-input" list="wrestler-list" placeholder="Type a wrestler name..." autocomplete="off">
    <datalist id="wrestler-list"></datalist>
    <button id="submit-btn">Submit</button>
    <button id="idk-btn">I don't know</button>
  </div>
  <p id="feedback"></p>
  <button id="next-btn">Next</button>

  <details id="stats-panel">
    <summary>Show progress</summary>
    <div id="stats-grid"></div>
    <button id="reset-btn">Reset Progress</button>
  </details>

  <script>
    const STORAGE_KEY = "sumo-quiz-stats";
    const BASE_WEIGHT = 1;
    const SCALE_WEIGHT = 9;
    const UNSEEN_ERROR_RATE = 0.5;

    let wrestlers = [];
    let correct = 0;
    let total = 0;
    let answered = false;
    let currentAnswer = null;

    const scoreEl = document.getElementById("score");
    const photoContainer = document.getElementById("photo-container");
    const inputEl = document.getElementById("guess-input");
    const datalistEl = document.getElementById("wrestler-list");
    const submitBtn = document.getElementById("submit-btn");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const idkBtn = document.getElementById("idk-btn");
    const statsGrid = document.getElementById("stats-grid");
    const progressFill = document.getElementById("progress-bar-fill");
    const progressText = document.getElementById("progress-text");

    // Strip diacritics: ō→o, ū→u, ā→a, etc.
    function normalizeName(name) {
      return name.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function loadStats() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveStats(stats) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
    }

    function getWrestlerStats(stats, name) {
      return stats[name] || { correct: 0, wrong: 0 };
    }

    function computeWeight(name, stats) {
      const s = getWrestlerStats(stats, name);
      const attempts = s.correct + s.wrong;
      const errorRate = attempts === 0 ? UNSEEN_ERROR_RATE : s.wrong / attempts;
      return BASE_WEIGHT + errorRate * SCALE_WEIGHT;
    }

    function weightedPick(stats) {
      const weights = wrestlers.map(w => computeWeight(w.name, stats));
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < wrestlers.length; i++) {
        r -= weights[i];
        if (r <= 0) return wrestlers[i];
      }
      return wrestlers[wrestlers.length - 1];
    }

    function populateDropdown() {
      datalistEl.innerHTML = "";
      const sorted = [...wrestlers].sort((a, b) => a.name.localeCompare(b.name));
      sorted.forEach(w => {
        const opt = document.createElement("option");
        opt.value = normalizeName(w.name);
        datalistEl.appendChild(opt);
      });
    }

    function updateProgress(stats) {
      const mastered = wrestlers.filter(w => {
        const s = getWrestlerStats(stats, w.name);
        const attempts = s.correct + s.wrong;
        return attempts >= 3 && (s.wrong / attempts) < 0.25;
      }).length;
      const pct = wrestlers.length ? (mastered / wrestlers.length) * 100 : 0;
      progressFill.style.width = `${pct}%`;
      progressText.textContent = `${mastered} / ${wrestlers.length}`;
    }

    function renderStatsPanel(stats) {
      statsGrid.innerHTML = "";
      const sorted = [...wrestlers].sort((a, b) => a.name.localeCompare(b.name));
      sorted.forEach(w => {
        const s = getWrestlerStats(stats, w.name);
        const attempts = s.correct + s.wrong;
        const errorRate = attempts === 0 ? UNSEEN_ERROR_RATE : s.wrong / attempts;
        const color = errorRate < 0.25 ? "#4ecca3"
                    : errorRate < 0.75 ? "#f5a623"
                    : "#e94560";
        const row = document.createElement("div");
        row.className = "stat-row";
        row.innerHTML = `
          <span class="stat-dot" style="background:${color}"></span>
          <span class="stat-name">${w.name}</span>
          <span class="stat-counts">${attempts === 0 ? "not seen" : `${s.correct}✓ ${s.wrong}✗`}</span>
        `;
        statsGrid.appendChild(row);
      });
    }

    function updateScore() {
      scoreEl.textContent = `Score: ${correct} / ${total}`;
    }

    function loadRound() {
      const stats = loadStats();
      answered = false;
      nextBtn.style.display = "none";
      feedbackEl.textContent = "";
      feedbackEl.className = "";
      inputEl.value = "";
      inputEl.disabled = false;
      submitBtn.disabled = false;
      idkBtn.disabled = false;

      currentAnswer = weightedPick(stats);

      const img = document.createElement("img");
      img.src = `wiki_images/${encodeURIComponent(currentAnswer.image)}`;
      img.alt = "Sumo wrestler";
      photoContainer.innerHTML = "";
      photoContainer.appendChild(img);
    }

    submitBtn.addEventListener("click", () => {
      const selected = inputEl.value.trim();
      const isValid = wrestlers.some(w => normalizeName(w.name) === selected);
      if (answered || !isValid) return;
      answered = true;
      total++;

      inputEl.disabled = true;
      submitBtn.disabled = true;
      idkBtn.disabled = true;

      const stats = loadStats();
      if (!stats[currentAnswer.name]) stats[currentAnswer.name] = { correct: 0, wrong: 0 };

      if (normalizeName(currentAnswer.name) === selected) {
        correct++;
        stats[currentAnswer.name].correct++;
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "correct";
      } else {
        stats[currentAnswer.name].wrong++;
        feedbackEl.textContent = `Wrong! It was ${currentAnswer.name}`;
        feedbackEl.className = "wrong";
      }

      saveStats(stats);
      updateScore();
      updateProgress(stats);
      renderStatsPanel(stats);
      nextBtn.style.display = "inline-block";
    });

    nextBtn.addEventListener("click", loadRound);

    idkBtn.addEventListener("click", () => {
      if (answered) return;
      answered = true;
      total++;
      inputEl.disabled = true;
      submitBtn.disabled = true;
      idkBtn.disabled = true;

      const stats = loadStats();
      if (!stats[currentAnswer.name]) stats[currentAnswer.name] = { correct: 0, wrong: 0 };
      stats[currentAnswer.name].wrong++;

      feedbackEl.textContent = `It's ${currentAnswer.name}`;
      feedbackEl.className = "wrong";

      saveStats(stats);
      updateScore();
      updateProgress(stats);
      renderStatsPanel(stats);
      nextBtn.style.display = "inline-block";
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
      if (confirm("Reset all progress? This cannot be undone.")) {
        localStorage.removeItem(STORAGE_KEY);
        renderStatsPanel({});
        updateProgress({});
      }
    });

    fetch("wiki_images/wrestlers.json")
      .then(res => res.json())
      .then(data => {
        wrestlers = data;
        const stats = loadStats();
        populateDropdown();
        renderStatsPanel(stats);
        updateProgress(stats);
        updateScore();
        loadRound();
      })
      .catch(err => {
        document.getElementById("loading").textContent = "Failed to load wrestlers.json. Make sure to serve via a local server (python3 -m http.server).";
        console.error(err);
      });
  </script>
</body>
</html>
