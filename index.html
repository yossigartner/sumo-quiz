<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumo Wrestler Quiz</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #logo {
      margin-top: 28px;
      width: 88px;
      height: 88px;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(233, 69, 96, 0.35));
    }

    h1 {
      margin: 10px 0 8px;
      font-size: 1.8rem;
    }

    #score {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    #photo-container {
      width: 300px;
      max-width: calc(100vw - 32px);
      aspect-ratio: 300 / 380;
      border-radius: 12px;
      overflow: hidden;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    #photo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #options {
      margin: 24px 0;
      width: 340px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    #guess-input {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border: 2px solid #444;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
    }

    #guess-input::placeholder { color: #666; }

    #guess-input:focus {
      outline: none;
      border-color: #e94560;
    }

    #submit-btn {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    #submit-btn:hover:not(:disabled) {
      background: #c73652;
    }

    #submit-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #feedback {
      font-size: 1.1rem;
      margin-bottom: 8px;
      min-height: 1.4em;
    }

    #feedback.correct { color: #4ecca3; }
    #feedback.wrong { color: #e94560; }

    #next-btn {
      padding: 12px 40px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    #next-btn:hover {
      background: #c73652;
    }

    #loading {
      margin-top: 100px;
      font-size: 1.2rem;
      color: #aaa;
    }

    #progress-container {
      width: 340px;
      max-width: calc(100vw - 32px);
      margin-bottom: 16px;
    }

    #progress-label {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    #progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #16213e;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #333;
    }

    #progress-bar-fill {
      height: 100%;
      background: #4ecca3;
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }

    #stats-panel {
      width: 340px;
      max-width: calc(100vw - 32px);
      margin-top: 24px;
      margin-bottom: 32px;
    }

    #stats-panel summary {
      cursor: pointer;
      color: #aaa;
      font-size: 0.9rem;
      padding: 6px 0;
      user-select: none;
    }

    #stats-grid {
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
    }

    .stat-row {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      font-size: 0.85rem;
      border-bottom: 1px solid #222;
      gap: 8px;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-name { flex: 1; }

    .stat-counts { color: #888; font-size: 0.8rem; }

    #reset-btn {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
    }

    #reset-btn:hover { border-color: #e94560; color: #e94560; }

    #idk-btn {
      padding: 12px 20px;
      font-size: 1rem;
      border: 2px solid #444;
      border-radius: 10px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #idk-btn:hover:not(:disabled) {
      border-color: #f5a623;
      color: #f5a623;
    }

    #idk-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #basho-countdown {
      width: 340px;
      max-width: calc(100vw - 32px);
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    #basho-label {
      font-size: 0.75rem;
      color: #e94560;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    #basho-name {
      font-size: 1rem;
      font-weight: 600;
      color: #eee;
    }

    #basho-date {
      font-size: 0.8rem;
      color: #888;
      margin: 1px 0 6px;
    }

    #basho-timer {
      font-size: 1.25rem;
      font-weight: 700;
      color: #eee;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    #mode-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
      background: #16213e;
      border-radius: 10px;
      padding: 4px;
      width: 340px;
      max-width: calc(100vw - 32px);
    }

    .mode-tab {
      flex: 1;
      padding: 8px;
      font-size: 0.9rem;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: #e94560;
      color: #fff;
      font-weight: 600;
    }

    .mode-tab:hover:not(.active) { color: #eee; }

    #elim-ui {
      width: 340px;
      max-width: calc(100vw - 32px);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
    }

    #elim-progress-text {
      font-size: 0.9rem;
      color: #aaa;
    }

    #elim-bar-bg {
      width: 100%;
      height: 6px;
      background: #16213e;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #333;
    }

    #elim-bar-fill {
      height: 100%;
      background: #4ecca3;
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    #elim-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    #unknown-btn {
      flex: 1;
      padding: 14px;
      font-size: 1rem;
      border: 2px solid #e94560;
      border-radius: 10px;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #unknown-btn:hover { background: #e94560; color: #fff; }

    #know-btn {
      flex: 1;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #4ecca3;
      color: #1a1a2e;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    #know-btn:hover { background: #3ab890; }

    #elim-hint {
      font-size: 0.75rem;
      color: #555;
    }

    #training-summary {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 340px;
      max-width: calc(100vw - 32px);
      margin: 20px 0;
      text-align: center;
    }

    #summary-text {
      color: #aaa;
      font-size: 1rem;
      line-height: 1.7;
    }

    #start-training-btn {
      padding: 12px 36px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    #start-training-btn:hover:not(:disabled) { background: #c73652; }
    #start-training-btn:disabled { opacity: 0.4; cursor: default; }

    #redo-elim-btn {
      padding: 8px 16px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
    }

    #redo-elim-btn:hover { border-color: #e94560; color: #e94560; }

    #music-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #16213e;
      color: #666;
      font-size: 1.15rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #music-btn:hover { border-color: #888; color: #ccc; }

    #music-btn.music-on {
      border-color: #e94560;
      color: #e94560;
      background: rgba(233, 69, 96, 0.12);
      animation: music-pulse 2.5s ease-in-out infinite;
    }

    @keyframes music-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.3); }
      50%       { box-shadow: 0 0 0 8px rgba(233, 69, 96, 0); }
    }

    /* ── Custom autocomplete ── */
    #input-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #ac-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1c2a4a;
      border: 1px solid #3a4a6a;
      border-radius: 8px;
      overflow-y: auto;
      max-height: 210px;
      z-index: 200;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .ac-item {
      padding: 11px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      border-bottom: 1px solid #243050;
      color: #ddd;
      transition: background 0.1s, color 0.1s;
    }

    .ac-item:last-child { border-bottom: none; }

    .ac-item:hover, .ac-item.sel {
      background: rgba(233, 69, 96, 0.18);
      color: #e94560;
    }

    /* ── basho-mid: no layout effect on desktop ── */
    #basho-mid { display: contents; }

    /* ── Mobile layout ── */
    @media (max-width: 600px) {
      #logo { width: 46px; height: 46px; margin-top: 10px; }
      h1 { font-size: 1.15rem; margin: 5px 0 3px; }
      #score { font-size: 0.88rem; margin-bottom: 6px; }

      #mode-tabs {
        width: calc(100vw - 24px);
        margin-bottom: 6px;
        padding: 3px;
      }
      .mode-tab { padding: 5px; font-size: 0.8rem; }

      #progress-container { width: calc(100vw - 24px); margin-bottom: 6px; }

      /* Compact basho: label on top, then name ↔ timer on one line, date below */
      #basho-countdown {
        width: calc(100vw - 24px);
        padding: 7px 12px;
        margin-bottom: 6px;
        text-align: left;
      }
      #basho-label { font-size: 0.62rem; letter-spacing: 0.09em; margin-bottom: 2px; }
      #basho-mid {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      #basho-name { font-size: 0.85rem; font-weight: 600; }
      #basho-timer { font-size: 0.92rem; font-weight: 700; flex-shrink: 0; }
      #basho-date { font-size: 0.68rem; margin: 2px 0 0; }

      /* Photo: height-capped so everything fits in one screenful */
      #photo-container {
        width: clamp(140px, calc((100dvh - 350px) * 300 / 380), calc(100vw - 32px));
      }

      #options { width: calc(100vw - 24px); margin: 8px 0; gap: 7px; }
      #guess-input { padding: 10px 12px; font-size: 0.95rem; }
      #submit-btn  { padding: 10px 14px; font-size: 0.95rem; }
      #idk-btn     { padding: 10px 14px; font-size: 0.95rem; }

      #feedback { font-size: 0.95rem; }
      #next-btn { padding: 10px 28px; font-size: 1rem; }

      #stats-panel    { width: calc(100vw - 24px); }
      #elim-ui        { width: calc(100vw - 24px); }
      #training-summary { width: calc(100vw - 24px); }

      #ac-list { max-height: 170px; }
      .ac-item  { padding: 12px 14px; font-size: 1rem; } /* bigger tap targets */
    }
  </style>
</head>
<body>
  <img id="logo" src="logo.svg" alt="Sumo Quiz Logo">
  <h1>Sumo Wrestler Quiz</h1>
  <p id="score"></p>
  <div id="mode-tabs">
    <button id="tab-quiz" class="mode-tab active">Quiz</button>
    <button id="tab-training" class="mode-tab">Training Mode</button>
  </div>
  <div id="progress-container">
    <div id="progress-label"><span>Mastered</span><span id="progress-text">0 / 0</span></div>
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
  </div>
  <div id="basho-countdown">
    <div id="basho-label">Next Basho</div>
    <div id="basho-mid">
      <div id="basho-name"></div>
      <div id="basho-timer"></div>
    </div>
    <div id="basho-date"></div>
  </div>

  <div id="photo-container">
    <span id="loading">Loading...</span>
  </div>
  <div id="options">
    <div id="input-wrap">
      <input id="guess-input" placeholder="Type a wrestler name..."
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div id="ac-list"></div>
    </div>
    <button id="submit-btn">Submit</button>
    <button id="idk-btn">I don't know</button>
  </div>
  <p id="feedback"></p>
  <button id="next-btn">Next</button>

  <div id="elim-ui">
    <div id="elim-progress-text"></div>
    <div id="elim-bar-bg"><div id="elim-bar-fill"></div></div>
    <div id="elim-buttons">
      <button id="unknown-btn">Don't Know</button>
      <button id="know-btn">I Know This</button>
    </div>
    <div id="elim-hint">← / N &nbsp;·&nbsp; Know / Y →</div>
  </div>

  <div id="training-summary">
    <p id="summary-text"></p>
    <button id="start-training-btn">Start Training</button>
    <button id="redo-elim-btn">Redo Elimination</button>
  </div>

  <details id="stats-panel">
    <summary>Show progress</summary>
    <div id="stats-grid"></div>
    <button id="reset-btn">Reset Progress</button>
  </details>

  <script>
    const STORAGE_KEY = "sumo-quiz-stats";
    const KNOWN_KEY   = "sumo-quiz-known";
    const BASE_WEIGHT = 1;
    const SCALE_WEIGHT = 9;
    const UNSEEN_ERROR_RATE = 0.5;

    let wrestlers = [];
    let correct = 0;
    let total = 0;
    let answered = false;
    let currentAnswer = null;
    let winStreak = 0;

    // Training mode state
    let gameMode = "quiz";          // "quiz" | "elimination" | "summary" | "training"
    let eliminationQueue = [];
    let knownSet = new Set();

    function loadKnown() {
      try { return new Set(JSON.parse(localStorage.getItem(KNOWN_KEY)) || []); }
      catch { return new Set(); }
    }
    function saveKnown() {
      localStorage.setItem(KNOWN_KEY, JSON.stringify([...knownSet]));
    }
    function hasEliminationData() {
      return localStorage.getItem(KNOWN_KEY) !== null;
    }
    function getUnknownPool() {
      return wrestlers.filter(w => !knownSet.has(w.name));
    }

    const scoreEl = document.getElementById("score");
    const photoContainer = document.getElementById("photo-container");
    const inputEl = document.getElementById("guess-input");
    const acList  = document.getElementById("ac-list");
    const submitBtn = document.getElementById("submit-btn");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const idkBtn = document.getElementById("idk-btn");
    const statsGrid = document.getElementById("stats-grid");
    const progressFill = document.getElementById("progress-bar-fill");
    const progressText = document.getElementById("progress-text");

    // Strip diacritics: ō→o, ū→u, ā→a, etc.
    function normalizeName(name) {
      return name.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function loadStats() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveStats(stats) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
    }

    function getWrestlerStats(stats, name) {
      return stats[name] || { correct: 0, wrong: 0 };
    }

    function computeWeight(name, stats) {
      const s = getWrestlerStats(stats, name);
      const attempts = s.correct + s.wrong;
      const errorRate = attempts === 0 ? UNSEEN_ERROR_RATE : s.wrong / attempts;
      return BASE_WEIGHT + errorRate * SCALE_WEIGHT;
    }

    function weightedPick(pool, stats) {
      const weights = pool.map(w => computeWeight(w.name, stats));
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < pool.length; i++) {
        r -= weights[i];
        if (r <= 0) return pool[i];
      }
      return pool[pool.length - 1];
    }

    // ── Custom autocomplete (replaces native datalist) ────────────
    let acSelIdx = -1;

    function showAC(matches) {
      acList.innerHTML = "";
      acSelIdx = -1;
      matches.forEach(w => {
        const item = document.createElement("div");
        item.className = "ac-item";
        item.textContent = normalizeName(w.name);
        // pointerdown fires before input blur; preventDefault keeps the input focused
        item.addEventListener("pointerdown", e => e.preventDefault());
        item.addEventListener("click", () => pickAC(normalizeName(w.name)));
        acList.appendChild(item);
      });
      acList.style.display = "block";
    }

    function hideAC() {
      acList.style.display = "none";
      acSelIdx = -1;
    }

    function pickAC(name) {
      inputEl.value = name;
      hideAC();
      inputEl.focus();
    }

    function moveAC(dir) {
      const items = acList.querySelectorAll(".ac-item");
      if (!items.length) return;
      if (acSelIdx >= 0) items[acSelIdx].classList.remove("sel");
      acSelIdx = Math.max(0, Math.min(items.length - 1, acSelIdx + dir));
      items[acSelIdx].classList.add("sel");
      items[acSelIdx].scrollIntoView({ block: "nearest" });
    }

    inputEl.addEventListener("input", () => {
      if (answered) { hideAC(); return; }
      const val = normalizeName(inputEl.value.trim()).toLowerCase();
      if (!val) { hideAC(); return; }
      const matches = wrestlers
        .filter(w => normalizeName(w.name).toLowerCase().includes(val))
        .sort((a, b) => {
          const an = normalizeName(a.name).toLowerCase();
          const bn = normalizeName(b.name).toLowerCase();
          if (an.startsWith(val) !== bn.startsWith(val)) return an.startsWith(val) ? -1 : 1;
          return an.localeCompare(bn);
        })
        .slice(0, 9);
      matches.length ? showAC(matches) : hideAC();
    });

    inputEl.addEventListener("blur", hideAC);

    inputEl.addEventListener("keydown", e => {
      if (acList.style.display === "none") return;
      if (e.key === "ArrowDown")  { e.preventDefault(); moveAC(1);  return; }
      if (e.key === "ArrowUp")    { e.preventDefault(); moveAC(-1); return; }
      if (e.key === "Escape")     { hideAC(); return; }
      if (e.key === "Enter") {
        const sel = acList.querySelector(".ac-item.sel");
        if (sel) { e.preventDefault(); pickAC(sel.textContent); }
      }
    });

    function updateProgress(stats) {
      const pool = gameMode === "training" ? getUnknownPool() : wrestlers;
      const mastered = pool.filter(w => {
        const s = getWrestlerStats(stats, w.name);
        const attempts = s.correct + s.wrong;
        return attempts >= 3 && (s.wrong / attempts) < 0.25;
      }).length;
      const pct = pool.length ? (mastered / pool.length) * 100 : 0;
      progressFill.style.width = `${pct}%`;
      progressText.textContent = `${mastered} / ${pool.length}`;
    }

    function renderStatsPanel(stats) {
      statsGrid.innerHTML = "";
      const sorted = [...wrestlers].sort((a, b) => a.name.localeCompare(b.name));
      sorted.forEach(w => {
        const s = getWrestlerStats(stats, w.name);
        const attempts = s.correct + s.wrong;
        const errorRate = attempts === 0 ? UNSEEN_ERROR_RATE : s.wrong / attempts;
        const color = errorRate < 0.25 ? "#4ecca3"
                    : errorRate < 0.75 ? "#f5a623"
                    : "#e94560";
        const row = document.createElement("div");
        row.className = "stat-row";
        row.innerHTML = `
          <span class="stat-dot" style="background:${color}"></span>
          <span class="stat-name">${w.name}</span>
          <span class="stat-counts">${attempts === 0 ? "not seen" : `${s.correct}✓ ${s.wrong}✗`}</span>
        `;
        statsGrid.appendChild(row);
      });
    }

    function updateScore() {
      scoreEl.textContent = `Score: ${correct} / ${total}`;
    }

    function showWrestlerPhoto(wrestler) {
      const img = document.createElement("img");
      img.src = `wiki_images/${encodeURIComponent(wrestler.image)}`;
      img.alt = "Sumo wrestler";
      photoContainer.innerHTML = "";
      photoContainer.appendChild(img);
    }

    function loadRound() {
      hideAC();
      const pool = gameMode === "training" ? getUnknownPool() : wrestlers;
      if (pool.length === 0) {
        photoContainer.innerHTML = `<div style="text-align:center;padding:20px;color:#4ecca3;font-size:1.05rem;font-weight:600;line-height:1.6">
          Training pool mastered!<br>
          <span style="font-size:0.85rem;color:#888;font-weight:400">Redo elimination to refresh your pool</span>
        </div>`;
        feedbackEl.textContent = "";
        nextBtn.style.display = "none";
        return;
      }
      const stats = loadStats();
      answered = false;
      nextBtn.style.display = "none";
      feedbackEl.textContent = "";
      feedbackEl.className = "";
      inputEl.value = "";
      inputEl.disabled = false;
      submitBtn.disabled = false;
      idkBtn.disabled = false;

      currentAnswer = weightedPick(pool, stats);
      showWrestlerPhoto(currentAnswer);
    }

    submitBtn.addEventListener("click", () => {
      hideAC();
      const selected = inputEl.value.trim();
      const isValid = wrestlers.some(w => normalizeName(w.name) === selected);
      if (answered || !isValid) return;
      answered = true;
      total++;

      inputEl.disabled = true;
      submitBtn.disabled = true;
      idkBtn.disabled = true;

      const stats = loadStats();
      if (!stats[currentAnswer.name]) stats[currentAnswer.name] = { correct: 0, wrong: 0 };

      if (normalizeName(currentAnswer.name) === selected) {
        correct++;
        stats[currentAnswer.name].correct++;
        winStreak++;
        feedbackEl.textContent = "Correct!";
        feedbackEl.className = "correct";
        if (correct === 8 && (total - correct) < 8) {
          const utt = new SpeechSynthesisUtterance("勝ち越し");
          utt.lang = "ja-JP";
          speechSynthesis.speak(utt);
        }
      } else {
        stats[currentAnswer.name].wrong++;
        winStreak = 0;
        feedbackEl.textContent = `Wrong! It was ${currentAnswer.name}`;
        feedbackEl.className = "wrong";
      }

      saveStats(stats);
      updateScore();
      updateProgress(stats);
      renderStatsPanel(stats);
      nextBtn.style.display = "inline-block";
    });

    nextBtn.addEventListener("click", loadRound);

    idkBtn.addEventListener("click", () => {
      hideAC();
      if (answered) return;
      answered = true;
      total++;
      inputEl.disabled = true;
      submitBtn.disabled = true;
      idkBtn.disabled = true;

      const stats = loadStats();
      if (!stats[currentAnswer.name]) stats[currentAnswer.name] = { correct: 0, wrong: 0 };
      stats[currentAnswer.name].wrong++;
      winStreak = 0;

      feedbackEl.textContent = `It's ${currentAnswer.name}`;
      feedbackEl.className = "wrong";

      saveStats(stats);
      updateScore();
      updateProgress(stats);
      renderStatsPanel(stats);
      nextBtn.style.display = "inline-block";
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
      if (confirm("Reset all progress? This cannot be undone.")) {
        localStorage.removeItem(STORAGE_KEY);
        renderStatsPanel({});
        updateProgress({});
      }
    });

    // === TRAINING MODE ===

    function setUIMode(mode) {
      gameMode = mode;
      const isQuizLike = mode === "quiz" || mode === "training";
      const isElim = mode === "elimination";
      const isSummary = mode === "summary";

      document.getElementById("tab-quiz").classList.toggle("active", mode === "quiz");
      document.getElementById("tab-training").classList.toggle("active", mode !== "quiz");

      document.getElementById("score").style.display = isQuizLike ? "" : "none";
      document.getElementById("progress-container").style.display = isQuizLike ? "" : "none";
      document.getElementById("options").style.display = isQuizLike ? "" : "none";
      document.getElementById("stats-panel").style.display = isQuizLike ? "" : "none";
      feedbackEl.style.display = isQuizLike ? "" : "none";

      photoContainer.style.display = (isQuizLike || isElim) ? "" : "none";

      document.getElementById("elim-ui").style.display = isElim ? "flex" : "none";
      document.getElementById("training-summary").style.display = isSummary ? "flex" : "none";

      if (!isQuizLike) nextBtn.style.display = "none";
    }

    function startElimination() {
      knownSet = new Set();
      eliminationQueue = [...wrestlers].sort(() => Math.random() - 0.5);
      setUIMode("elimination");
      nextElimination();
    }

    function nextElimination() {
      if (eliminationQueue.length === 0) {
        saveKnown();
        showSummary();
        return;
      }
      const reviewed = wrestlers.length - eliminationQueue.length;
      const pct = (reviewed / wrestlers.length) * 100;
      document.getElementById("elim-progress-text").textContent =
        `${reviewed} / ${wrestlers.length} reviewed · ${knownSet.size} known`;
      document.getElementById("elim-bar-fill").style.width = `${pct}%`;
      showWrestlerPhoto(eliminationQueue[0]);
    }

    function markKnown() {
      if (gameMode !== "elimination" || eliminationQueue.length === 0) return;
      knownSet.add(eliminationQueue.shift().name);
      nextElimination();
    }

    function markUnknown() {
      if (gameMode !== "elimination" || eliminationQueue.length === 0) return;
      eliminationQueue.shift();
      nextElimination();
    }

    function showSummary() {
      const unknowns = getUnknownPool();
      const known = wrestlers.length - unknowns.length;
      document.getElementById("summary-text").innerHTML =
        `You know <strong style="color:#4ecca3">${known}</strong> wrestler${known !== 1 ? "s" : ""}.<br>` +
        `Training on <strong style="color:#e94560">${unknowns.length}</strong> unknown${unknowns.length !== 1 ? "s" : ""}.`;
      const startBtn = document.getElementById("start-training-btn");
      startBtn.disabled = unknowns.length === 0;
      startBtn.textContent = unknowns.length === 0 ? "No unknowns to train!" : "Start Training";
      setUIMode("summary");
    }

    function startTraining() {
      correct = 0;
      total = 0;
      setUIMode("training");
      const stats = loadStats();
      updateProgress(stats);
      updateScore();
      loadRound();
    }

    document.getElementById("tab-quiz").addEventListener("click", () => {
      if (wrestlers.length === 0) return;
      correct = 0;
      total = 0;
      setUIMode("quiz");
      const stats = loadStats();
      updateProgress(stats);
      updateScore();
      loadRound();
    });

    document.getElementById("tab-training").addEventListener("click", () => {
      if (wrestlers.length === 0) return;
      knownSet = loadKnown();
      if (!hasEliminationData()) {
        startElimination();
      } else {
        showSummary();
      }
    });

    document.getElementById("unknown-btn").addEventListener("click", markUnknown);
    document.getElementById("know-btn").addEventListener("click", markKnown);
    document.getElementById("start-training-btn").addEventListener("click", startTraining);
    document.getElementById("redo-elim-btn").addEventListener("click", startElimination);

    document.addEventListener("keydown", e => {
      if (gameMode !== "elimination") return;
      if (e.key === "ArrowRight" || e.key === "y" || e.key === "Y") markKnown();
      if (e.key === "ArrowLeft"  || e.key === "n" || e.key === "N") markUnknown();
    });

    // === BASHO COUNTDOWN ===

    const BASHO_SCHEDULE = [
      { name: "Hatsu Basho",  start: new Date("2026-01-11"), end: new Date("2026-01-25"), location: "Tokyo" },
      { name: "Haru Basho",   start: new Date("2026-03-08"), end: new Date("2026-03-22"), location: "Osaka" },
      { name: "Natsu Basho",  start: new Date("2026-05-10"), end: new Date("2026-05-24"), location: "Tokyo" },
      { name: "Nagoya Basho", start: new Date("2026-07-12"), end: new Date("2026-07-26"), location: "Nagoya" },
      { name: "Aki Basho",    start: new Date("2026-09-13"), end: new Date("2026-09-27"), location: "Tokyo" },
      { name: "Kyushu Basho", start: new Date("2026-11-08"), end: new Date("2026-11-22"), location: "Fukuoka" },
    ];

    function getBashoStatus() {
      const now = new Date();
      for (const b of BASHO_SCHEDULE) {
        if (now >= b.start && now <= b.end) return { basho: b, live: true };
      }
      for (const b of BASHO_SCHEDULE) {
        if (now < b.start) return { basho: b, live: false };
      }
      return null;
    }

    function formatCountdown(ms) {
      const s = Math.floor(ms / 1000);
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      const pad = n => String(n).padStart(2, "0");
      return d > 0
        ? `${d}d ${pad(h)}h ${pad(m)}m ${pad(sec)}s`
        : `${pad(h)}h ${pad(m)}m ${pad(sec)}s`;
    }

    function updateBashoCountdown() {
      const status = getBashoStatus();
      const countdownEl = document.getElementById("basho-countdown");
      if (!status) { countdownEl.style.display = "none"; return; }

      const { basho, live } = status;
      const startOpts = { month: "long", day: "numeric" };
      const startStr = basho.start.toLocaleDateString("en-US", startOpts);
      const endStr = basho.end.toLocaleDateString("en-US", { day: "numeric" });

      document.getElementById("basho-name").textContent = basho.name;
      document.getElementById("basho-date").textContent =
        `${startStr}–${endStr}, ${basho.start.getFullYear()} · ${basho.location}`;

      const timerEl = document.getElementById("basho-timer");
      if (live) {
        timerEl.textContent = "Live now!";
        timerEl.style.color = "#4ecca3";
        document.getElementById("basho-label").textContent = "Basho in Progress";
      } else {
        timerEl.textContent = formatCountdown(basho.start - new Date());
        timerEl.style.color = "#eee";
        document.getElementById("basho-label").textContent = "Next Basho";
      }
    }

    updateBashoCountdown();
    setInterval(updateBashoCountdown, 1000);

    fetch("wiki_images/wrestlers.json")
      .then(res => res.json())
      .then(data => {
        wrestlers = data;
        const stats = loadStats();
        renderStatsPanel(stats);
        updateProgress(stats);
        updateScore();
        loadRound();
      })
      .catch(err => {
        document.getElementById("loading").textContent = "Failed to load wrestlers.json. Make sure to serve via a local server (python3 -m http.server).";
        console.error(err);
      });
  </script>
  <button id="music-btn" title="Play lofi BGM">♪</button>

  <script>
  // ─── LOFI JAPANESE BGM (Web Audio API — no external files) ────────────────
  (function () {
    let ctx = null, master = null, musicOn = false, loopTimer = null;

    const BPM = 74;
    const B   = 60 / BPM;   // one beat in seconds
    const BAR = B * 4;

    function hz(name, oct) {
      const s = {C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
      return 440 * Math.pow(2, (s[name] - 9 + (oct - 4) * 12) / 12);
    }

    function boot() {
      if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createGain();
        master.gain.value = 0.42;
        master.connect(ctx.destination);
      }
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    // Piano-like note: triangle wave + lofi LPF + subtle echo
    function piano(f, t, dur, vol, type = 'triangle') {
      const ac = boot();
      const osc = ac.createOscillator(), env = ac.createGain();
      const lpf = ac.createBiquadFilter();
      const dly = ac.createDelay(1.0), dlyGain = ac.createGain();

      lpf.type = 'lowpass'; lpf.frequency.value = 1700; lpf.Q.value = 0.5;
      dly.delayTime.value = B * 0.66;
      dlyGain.gain.value = 0.18;

      osc.type = type;
      osc.frequency.value = f;
      osc.detune.value = (Math.random() - 0.5) * 9; // warm lofi detune

      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(vol, t + 0.018);
      env.gain.setValueAtTime(vol * 0.6, t + 0.07);
      env.gain.exponentialRampToValueAtTime(0.0001, t + dur);

      osc.connect(lpf); lpf.connect(env);
      env.connect(master);
      env.connect(dly); dly.connect(dlyGain); dlyGain.connect(master);

      osc.start(t);
      osc.stop(t + dur + dly.delayTime.value + 0.1);
    }

    // Soft sustained pad chord note
    function padNote(f, t, dur, vol) {
      const ac = boot();
      const osc = ac.createOscillator(), env = ac.createGain();
      const lpf = ac.createBiquadFilter();
      lpf.type = 'lowpass'; lpf.frequency.value = 650;
      osc.type = 'sine'; osc.frequency.value = f;
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(vol, t + 0.9);
      env.gain.setValueAtTime(vol, t + dur - 1.0);
      env.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(lpf); lpf.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + dur + 0.1);
    }

    // Kick drum (pitch-drop sine)
    function kick(t) {
      const ac = boot();
      const osc = ac.createOscillator(), env = ac.createGain();
      osc.frequency.setValueAtTime(130, t);
      osc.frequency.exponentialRampToValueAtTime(42, t + 0.14);
      env.gain.setValueAtTime(0.28, t);
      env.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
      osc.connect(env); env.connect(master);
      osc.start(t); osc.stop(t + 0.32);
    }

    // Hi-hat (filtered white noise)
    function hat(t, vol) {
      const ac = boot();
      const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.04), ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = ac.createBufferSource(); src.buffer = buf;
      const hpf = ac.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 7500;
      const env = ac.createGain();
      env.gain.setValueAtTime(vol, t);
      env.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
      src.connect(hpf); hpf.connect(env); env.connect(master);
      src.start(t); src.stop(t + 0.05);
    }

    function scheduleLoop(t) {
      if (!musicOn) return;

      // A minor pentatonic: A  C  D  E  G
      const A2=hz('A',2), C3=hz('C',3), D3=hz('D',3), E3=hz('E',3), G3=hz('G',3);
      const A3=hz('A',3), C4=hz('C',4), D4=hz('D',4), E4=hz('E',4), G4=hz('G',4);

      // ── Melody over 8 bars (positions in beats) ──────────────────────
      [
        // bar 1
        [E4, 0.0,  1.8], [D4, 2.0, 1.2], [C4, 3.0, 1.4],
        // bar 2
        [A3, 4.0,  2.2], [G3, 6.5, 0.8], [A3, 7.2, 1.0],
        // bar 3
        [C4, 8.0,  0.9], [D4, 9.0, 0.9], [E4, 10.0, 2.0],
        // bar 4
        [D4, 12.0, 1.5], [C4, 14.0, 0.9], [A3, 15.2, 1.8],
        // bar 5
        [G4, 16.0, 1.5], [E4, 17.5, 0.9], [D4, 18.5, 1.5],
        // bar 6
        [C4, 20.0, 2.5], [A3, 22.5, 0.9], [C4, 23.5, 1.2],
        // bar 7
        [E4, 24.0, 0.9], [D4, 25.0, 0.9], [C4, 26.0, 0.9], [A3, 27.0, 1.5],
        // bar 8
        [A3, 28.0, 2.0], [C4, 30.0, 0.9], [E4, 31.0, 2.0],
      ].forEach(([f, b, d]) => piano(f, t + b * B, d * B, 0.2));

      // ── Bass — one root note per bar ──────────────────────────────────
      [[A2,0],[A2,1],[C3,2],[D3,3],[E3,4],[D3,5],[A2,6],[A2,7]]
        .forEach(([f, bar]) => piano(f, t + BAR * bar, BAR * 0.55, 0.25, 'sine'));

      // ── Pads — 2 bars each (all notes from A minor pentatonic) ────────
      [[A3,C4,E4],[C3,E3,G3],[D3,A3,E4],[E3,G3,C4]].forEach((chord, i) => {
        chord.forEach(f => padNote(f, t + BAR * i * 2, BAR * 2.1, 0.055));
      });

      // ── Percussion ───────────────────────────────────────────────────
      for (let bar = 0; bar < 8; bar++) {
        const bt = t + BAR * bar;
        kick(bt);                          // beat 1
        kick(bt + B * 2 + 0.02);          // beat 3 (slight swing feel)
        for (let h = 0; h < 8; h++) {
          hat(bt + B * h * 0.5, h % 2 === 0 ? 0.032 : 0.018); // swing accent
        }
      }

      // Schedule next loop slightly before end to prevent silence gap
      loopTimer = setTimeout(
        () => scheduleLoop(boot().currentTime + 0.1),
        (BAR * 8 - 0.3) * 1000
      );
    }

    function toggleMusic() {
      const btn = document.getElementById('music-btn');
      if (!musicOn) {
        musicOn = true;
        boot();
        scheduleLoop(ctx.currentTime + 0.12);
        btn.classList.add('music-on');
        btn.title = 'Click to mute';
      } else {
        musicOn = false;
        clearTimeout(loopTimer); loopTimer = null;
        if (master) {
          master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.7);
          setTimeout(() => { if (master && !musicOn) master.gain.value = 0.42; }, 900);
        }
        btn.classList.remove('music-on');
        btn.title = 'Play lofi BGM';
      }
    }

    document.getElementById('music-btn').addEventListener('click', toggleMusic);
  })();
  </script>
