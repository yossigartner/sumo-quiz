<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circular badge -->
  <circle cx="50" cy="50" r="49" fill="#16213e"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#e94560" stroke-width="3"/>
  <!-- Dohyo inner ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>

  <!-- Topknot -->
  <ellipse cx="50" cy="12" rx="3" ry="5" fill="#ccc"/>
  <!-- Head -->
  <circle cx="50" cy="21" r="8.5" fill="#eee"/>
  <!-- Wide torso -->
  <ellipse cx="50" cy="44" rx="17" ry="13" fill="#eee"/>
  <!-- Mawashi (belt) -->
  <ellipse cx="50" cy="51" rx="13" ry="5.5" fill="#e94560"/>
  <!-- Mawashi knot -->
  <rect x="44" y="48" width="12" height="7" rx="2" fill="#c73652"/>

  <!-- Left arm extended outward and down -->
  <line x1="34" y1="40" x2="16" y2="58" stroke="#eee" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm extended outward and down -->
  <line x1="66" y1="40" x2="84" y2="58" stroke="#eee" stroke-width="8" stroke-linecap="round"/>

  <!-- Left leg wide stance -->
  <line x1="41" y1="57" x2="30" y2="80" stroke="#eee" stroke-width="9" stroke-linecap="round"/>
  <!-- Right leg wide stance -->
  <line x1="59" y1="57" x2="70" y2="80" stroke="#eee" stroke-width="9" stroke-linecap="round"/>
</svg>
