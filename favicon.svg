<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="#e8c56a" stroke-width="3"/>
  <!-- Body (large torso) -->
  <ellipse cx="50" cy="65" rx="26" ry="22" fill="#c8a87a"/>
  <!-- Head -->
  <circle cx="50" cy="36" r="14" fill="#c8a87a"/>
  <!-- Mawashi (belt) -->
  <ellipse cx="50" cy="67" rx="20" ry="8" fill="#2a1a0a" opacity="0.85"/>
  <!-- Arms -->
  <ellipse cx="25" cy="62" rx="8" ry="13" fill="#c8a87a" transform="rotate(-15 25 62)"/>
  <ellipse cx="75" cy="62" rx="8" ry="13" fill="#c8a87a" transform="rotate(15 75 62)"/>
  <!-- Topknot -->
  <ellipse cx="50" cy="24" rx="5" ry="4" fill="#2a1a0a"/>
  <rect x="47" y="20" width="6" height="6" rx="2" fill="#2a1a0a"/>
  <!-- Face details -->
  <circle cx="45" cy="35" r="2" fill="#2a1a0a"/>
  <circle cx="55" cy="35" r="2" fill="#2a1a0a"/>
  <path d="M 45 42 Q 50 46 55 42" stroke="#2a1a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
